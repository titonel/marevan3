{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-heart-pulse-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-light mt-2">Acesso Restrito</h3>
                    <p class="text-muted small">AME Caraguatatuba - Anticoagulação</p>
                </div>

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted">Usuário</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-light" placeholder="Digite seu usuário" required autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted">Senha</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="Digite sua senha" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar no Sistema</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
